name: kigali_city_directory
description: "A new Flutter project."
publish_to: 'none' # This prevents accidental publishing to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Map & location packages
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  google_maps_flutter: ^2.6.0
  geolocator: ^10.1.0

  # Utilities
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  provider: ^6.1.2

  # Firebase
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true